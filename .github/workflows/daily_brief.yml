name: Daily Competitor Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

concurrency:
  group: daily-competitor-brief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-daily-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create working folders
        run: mkdir -p data output

      - name: Run daily brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python src/run_daily.py

      - name: Save updated seen-links database
        run: |
          if [ ! -f data/seen_articles.db ] && [ ! -f data/last_successful_articles.json ]; then
            echo "No persisted data files found. Skipping save step."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f data/seen_articles.db ]; then
            cp data/seen_articles.db /tmp/seen_articles.db
          fi
          if [ -f data/last_successful_articles.json ]; then
            cp data/last_successful_articles.json /tmp/last_successful_articles.json
          fi

          git pull --rebase origin main || true
          if [ -f /tmp/seen_articles.db ]; then
            cp /tmp/seen_articles.db data/seen_articles.db
          fi
          if [ -f /tmp/last_successful_articles.json ]; then
            cp /tmp/last_successful_articles.json data/last_successful_articles.json
          fi

          if [ -f data/seen_articles.db ]; then
            git add data/seen_articles.db
          fi
          if [ -f data/last_successful_articles.json ]; then
            git add data/last_successful_articles.json
          fi

          if git diff --cached --quiet; then
            echo "No persisted data changes to save."
            exit 0
          fi

          git commit -m "Update persisted competitor data"

          if ! git push; then
            echo "Warning: could not push persisted data updates. The brief was still sent successfully."
            exit 0
          fi
